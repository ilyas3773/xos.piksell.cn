<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piksell 发卡系统 - 精选管理</title>
    <link rel="stylesheet" href="/static/admin/css/card-admin.css">
    <link rel="stylesheet" href="/static/admin/css/card-resource-binding.css">
    <style>
        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .featured-card {
            position: relative;
            border-radius: 10px;
            background: #ffffff;
            border: 2px solid #eef2f7;
            padding: 8px;
            transition: all .25s ease;
            cursor: pointer;
        }
        .featured-card:hover {
            border-color: #1f6bff;
            box-shadow: 0 4px 14px rgba(31, 107, 255, 0.12);
        }
        .featured-card.is-featured {
            border-color: #f5a623;
            background: linear-gradient(180deg, #fff8eb 0%, #ffffff 60%);
        }
        .featured-card-cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f1f5f9;
            border-radius: 8px;
            object-fit: cover;
            display: block;
        }
        .featured-card-cover-empty {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 12px;
        }
        .featured-card-name {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #16213a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .featured-card-en {
            margin-top: 2px;
            font-size: 11px;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .featured-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .featured-card-energy {
            font-size: 12px;
            color: #1f6bff;
            font-weight: 700;
        }
        .featured-card-cat {
            font-size: 11px;
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70px;
        }
        .featured-card-toggle {
            margin-top: 8px;
            width: 100%;
            padding: 6px 0;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .featured-card-toggle.add {
            background: #f5a623;
            color: #ffffff;
        }
        .featured-card-toggle.add:hover {
            background: #ea9612;
        }
        .featured-card-toggle.remove {
            background: #f1f5f9;
            color: #64748b;
        }
        .featured-card-toggle.remove:hover {
            background: #e2e8f0;
        }
        .featured-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #f5a623;
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
        }

        /* 列表视图 */
        .featured-list {
            margin-top: 16px;
            border: 1px solid #eef2f7;
            border-radius: 10px;
            overflow: hidden;
            background: #ffffff;
        }
        .featured-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            transition: background .2s;
        }
        .featured-row:last-child {
            border-bottom: none;
        }
        .featured-row:hover {
            background: #f8fafc;
        }
        .featured-row.is-featured {
            background: linear-gradient(90deg, #fff8eb 0%, #ffffff 60%);
        }
        .featured-row-cover {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f1f5f9;
        }
        .featured-row-info {
            flex: 1;
            min-width: 0;
        }
        .featured-row-name {
            font-size: 14px;
            font-weight: 700;
            color: #16213a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .featured-row-en {
            margin-top: 4px;
            font-size: 12px;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .featured-row-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
        }
        .featured-row-energy {
            color: #1f6bff;
            font-weight: 700;
        }
        .featured-row-cat {
            color: #64748b;
        }
        .featured-row-status {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
        }
        .featured-row-status.on {
            background: #f5a623;
            color: #ffffff;
        }
        .featured-row-status.off {
            background: #e2e8f0;
            color: #64748b;
        }
        .featured-row-action {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .featured-row-action.add {
            background: #f5a623;
            color: #ffffff;
        }
        .featured-row-action.remove {
            background: #f1f5f9;
            color: #64748b;
        }

        /* 视图切换按钮 */
        .featured-view-switch {
            display: inline-flex;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        .featured-view-btn {
            padding: 8px 14px;
            background: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
        }
        .featured-view-btn.active {
            background: #1f6bff;
            color: #ffffff;
        }
        .featured-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        .featured-summary-card {
            padding: 18px 22px;
            border-radius: 12px;
            background: linear-gradient(135deg, #fff8eb 0%, #ffffff 100%);
            border: 2px solid #f5dfb5;
        }
        .featured-summary-label {
            font-size: 13px;
            color: #94a3b8;
        }
        .featured-summary-value {
            margin-top: 6px;
            font-size: 26px;
            font-weight: 700;
            color: #16213a;
        }
        .featured-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .featured-empty {
            grid-column: 1 / -1;
            padding: 60px 0;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body data-view="featured" data-nav-key="featured">
<header class="header">
    <div class="brand">
        <span class="brand-dot"></span>
        <span>Piksell 发卡系统管理后台</span>
    </div>
    <div class="header-right">
        <span class="pill" id="adminName">admin</span>
        <button class="btn btn-light" id="refreshStatsBtn">刷新当前页</button>
        <button class="btn btn-light" id="logoutBtn">退出登录</button>
    </div>
</header>

<aside class="sidebar"></aside>

<main class="main">
    <div id="app"></div>
</main>

<div class="modal-mask" id="modalMask">
    <div class="modal">
        <div class="modal-head">
            <span id="modalTitle">标题</span>
            <button class="link-btn" id="modalCloseBtn">关闭</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot" id="modalFoot"></div>
    </div>
</div>

<script src="/static/admin/js/card-admin.js?v=2026052311"></script>
</body>
</html>
